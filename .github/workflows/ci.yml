name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifests:
    name: Validate manifests
    runs-on: windows-latest

    steps:
      - name: Check out bucket
        uses: actions/checkout@v4

      - name: Install Scoop
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
            Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          }

          $scoopShims = Join-Path $env:USERPROFILE 'scoop\shims'
          $scoop = Join-Path $scoopShims 'scoop.ps1'
          if (-not (Test-Path $scoop)) {
            throw "Scoop shim was not found at $scoop"
          }

          $scoopShims | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $scoop --version

      - name: Validate manifest JSON
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $manifestPaths = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'bucket') -Filter '*.json'
          if (-not $manifestPaths) {
            throw 'No Scoop manifests found in bucket/'
          }

          foreach ($manifestPath in $manifestPaths) {
            $relativePath = Resolve-Path -Path $manifestPath.FullName -Relative
            $manifest = Get-Content -Raw $manifestPath.FullName | ConvertFrom-Json

            foreach ($property in 'version', 'description', 'homepage', 'license') {
              if (-not $manifest.PSObject.Properties.Name.Contains($property)) {
                throw "$relativePath is missing required property '$property'"
              }
            }

            if ($manifest.PSObject.Properties.Name.Contains('architecture')) {
              if (@($manifest.architecture.PSObject.Properties).Count -eq 0) {
                throw "$relativePath has an empty architecture object"
              }

              foreach ($arch in $manifest.architecture.PSObject.Properties) {
                if (-not $arch.Value.url -or -not $arch.Value.hash) {
                  throw "$relativePath is missing url/hash for '$($arch.Name)'"
                }
              }
            } elseif (-not $manifest.url -or -not $manifest.hash) {
              throw "$relativePath is missing top-level url/hash"
            }
          }

      - name: Validate manifest bin entries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Get-ChildItem -Path "$env:GITHUB_WORKSPACE\bucket" -Filter '*.json' | ForEach-Object {
            $manifest = Get-Content -Raw $_.FullName | ConvertFrom-Json

            if ($manifest.PSObject.Properties.Name.Contains('bin')) {
              $binEntries = @($manifest.bin)

              foreach ($binEntry in $binEntries) {
                if ($binEntry -is [string]) {
                  continue
                }

                if ($binEntry -is [array] -and $binEntry.Count -gt 0 -and $binEntry[0] -is [string]) {
                  continue
                }

                throw "$($_.Name) has an unsupported bin entry: $($binEntry | ConvertTo-Json -Compress)"
              }
            }
          }

      - name: Validate with Scoop
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Get-ChildItem -Path "$env:GITHUB_WORKSPACE\bucket" -Filter '*.json' | ForEach-Object {
            $manifest = Get-Content -Raw $_.FullName | ConvertFrom-Json
            scoop info $_.FullName

            if ($manifest.PSObject.Properties.Name.Contains('architecture')) {
              foreach ($arch in $manifest.architecture.PSObject.Properties.Name) {
                scoop download $_.FullName --arch $arch --force --no-update-scoop
              }
            } else {
              scoop download $_.FullName --force --no-update-scoop
            }
          }

      - name: Test local install
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Get-ChildItem -Path "$env:GITHUB_WORKSPACE\bucket" -Filter '*.json' | ForEach-Object {
            $appName = $_.BaseName
            $manifest = Get-Content -Raw $_.FullName | ConvertFrom-Json

            scoop install $_.FullName --no-cache --no-update-scoop

            $installDir = scoop prefix $appName
            if (-not (Test-Path $installDir)) {
              throw "$appName install directory was not created"
            }

            if ($manifest.PSObject.Properties.Name.Contains('bin')) {
              $binEntries = @($manifest.bin)
              foreach ($binEntry in $binEntries) {
                if ($binEntry -is [string]) {
                  $binaryPath = $binEntry
                  $commandName = [System.IO.Path]::GetFileNameWithoutExtension((Split-Path -Leaf $binaryPath))
                } else {
                  $binaryPath = $binEntry[0]
                  $commandName = if ($binEntry.Count -gt 1) {
                    [System.IO.Path]::GetFileNameWithoutExtension($binEntry[1])
                  } else {
                    [System.IO.Path]::GetFileNameWithoutExtension((Split-Path -Leaf $binaryPath))
                  }
                }

                $shimDir = Join-Path $env:USERPROFILE 'scoop\shims'
                $shimPath = @('.exe', '.cmd', '.ps1') |
                  ForEach-Object { Join-Path $shimDir "$commandName$_" } |
                  Where-Object { Test-Path $_ } |
                  Select-Object -First 1
                if (-not $shimPath) {
                  throw "$commandName shim was not created"
                }

                if (-not (Test-Path (Join-Path $installDir $binaryPath))) {
                  throw "$binaryPath was not installed"
                }
              }
            }
          }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          if (Get-Command scoop -ErrorAction SilentlyContinue) {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE\bucket" -Filter '*.json' | ForEach-Object {
              scoop prefix $_.BaseName *> $null
              if ($LASTEXITCODE -eq 0) {
                scoop uninstall $_.BaseName
              }
            }
          }
